<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedzx V1 | Free Fire AI Hassasiyet Robotu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background-color: #0b0c10; background-image: radial-gradient(circle at 50% 50%, #1a0f1a 0%, #0b0c10 100%); }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        .neon-border { box-shadow: 0 0 20px rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="min-h-screen text-gray-200">

    <!-- GİRİŞ KİLİDİ (DUAL FOLLOW GATE) -->
    <div id="tiktok-gate" class="fixed inset-0 bg-black/98 backdrop-blur-xl z-[999] flex items-center justify-center p-4">
        <div class="bg-zinc-950 border border-red-500/30 p-8 rounded-2xl max-w-sm w-full text-center neon-border">
            <div class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce">
                <i class="fa-solid fa-lock text-white text-2xl"></i>
            </div>
            <h2 class="tech-font text-xl font-black text-white mb-6 uppercase tracking-widest">Erişim Kilitli</h2>
            
            <div class="space-y-4">
                <!-- Wedzx Button -->
                <a id="btn-wedzx" href="https://www.tiktok.com/@wedzx_" target="_blank" onclick="markDone('wedzx')" class="block w-full bg-zinc-800 hover:bg-red-600 transition text-white font-bold py-3 rounded-xl border border-red-500/20 text-sm">
                    <i class="fa-brands fa-tiktok mr-2"></i> @wedzx_ Takip Et
                </a>

                <!-- Tilkixz0 Button -->
                <a id="btn-tilkixz0" href="https://www.tiktok.com/@tilkixz0" target="_blank" onclick="markDone('tilkixz0')" class="block w-full bg-zinc-800 hover:bg-purple-600 transition text-white font-bold py-3 rounded-xl border border-purple-500/20 text-sm">
                    <i class="fa-brands fa-tiktok mr-2"></i> 120 FPS Edit için @tilkixz0 Takip Et
                </a>
            </div>

            <button id="enter-btn" disabled onclick="verifyAccess()" class="w-full mt-8 bg-zinc-900 text-zinc-600 font-bold py-4 rounded-xl tech-font tracking-widest cursor-not-allowed transition">
                GİRİŞ YAPMAK İÇİN TAKİP ET
            </button>
        </div>
    </div>

    <!-- SİTE İÇERİĞİ (Aynı kalıyor) -->
    <!-- ... (Header, Main, Form içeriğin buraya geliyor) ... -->

    <script>
        let wedzxFollowed = false;
        let tilkixz0Followed = false;

        function markDone(id) {
            if (id === 'wedzx') {
                wedzxFollowed = true;
                document.getElementById('btn-wedzx').classList.add('bg-red-600');
            }
            if (id === 'tilkixz0') {
                tilkixz0Followed = true;
                document.getElementById('btn-tilkixz0').classList.add('bg-purple-600');
            }
            
            // Eğer ikisi de tamamlandıysa butonun rengini aç
            if (wedzxFollowed && tilkixz0Followed) {
                const btn = document.getElementById('enter-btn');
                btn.disabled = false;
                btn.className = "w-full mt-8 bg-gradient-to-r from-red-600 to-purple-600 text-white font-bold py-4 rounded-xl tech-font tracking-widest cursor-pointer hover:scale-[1.02] transition";
                btn.innerText = "GİRİŞ YAP";
            }
        }

        function verifyAccess() {
            if (wedzxFollowed && tilkixz0Followed) {
                document.getElementById('tiktok-gate').classList.add('hidden');
            }
        }

        // Sayfa yenilenirse veya tekrar girilirse otomatik açılmaması için
        window.onload = () => {
            // İstersen buraya localStorage kontrolü ekleyerek 
            // takip edenin bir daha görmemesini sağlayabilirsin.
        }
    </script>
</body>
</html>
